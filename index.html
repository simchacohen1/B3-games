<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>B3 Games</title>
<style>
    body {
        font-family: Arial, sans-serif;
        background: #f5f7fa;
        text-align: center;
        padding: 40px;
    }

    h1 {
        font-size: 48px;
        margin-bottom: 30px;
        color: #333;
    }

    .game-container {
        display: flex;
        flex-direction: column;
        gap: 20px;
        max-width: 400px;
        margin: auto;
    }

    .game-card {
        background: white;
        padding: 20px;
        border-radius: 12px;
        box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        font-size: 24px;
        font-weight: bold;
        color: #333;
        text-decoration: none;
        transition: transform 0.15s, box-shadow 0.15s;
    }

    .game-card:hover {
        transform: translateY(-4px);
        box-shadow: 0 6px 14px rgba(0,0,0,0.15);
    }

    .hidden {
        display: none !important;
    }

    .admin-button {
        position: fixed;
        top: 12px;
        right: 12px;
        z-index: 9999;
        border: none;
        border-radius: 999px;
        padding: 10px 16px;
        background: #1f2937;
        color: white;
        font-weight: bold;
        cursor: pointer;
        box-shadow: 0 6px 16px rgba(0,0,0,0.15);
    }

    .admin-panel {
        position: fixed;
        top: 60px;
        right: 12px;
        width: 280px;
        background: white;
        border-radius: 16px;
        box-shadow: 0 14px 32px rgba(0,0,0,0.18);
        padding: 16px;
        text-align: left;
        z-index: 9999;
    }

    .admin-panel h2 {
        margin: 0 0 12px;
        font-size: 20px;
    }

    .admin-row {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        margin: 10px 0;
        font-size: 15px;
    }

    .disabled-note {
        margin-top: 40px;
        color: #4b5563;
    }
</style>
<script src="https://www.gstatic.com/firebasejs/12.15.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/12.15.0/firebase-database-compat.js"></script>
<script src="firebase-config.js"></script>
<script src="site-settings.js"></script>
</head>

<body>
    <h1>B3 Games</h1>

    <div class="game-container">
        <a class="game-card" data-game-id="tzitzis-game" href="tzitzis_game.html">Tzitzis Game</a>
        <a class="game-card" data-game-id="tzitzis-quest-arcade" href="tzitzis_quest_arcade_v2.html">Tzitzis Quest Arcade</a>
        <a class="game-card" data-game-id="kahoot-word-quiz" href="kahoot_word_quiz_engine_paste_only_any_perek.html">Kahoot Word Quiz Engine</a>
      <a class="game-card" data-game-id="kodesh-construct" href="kodesh-construct.html">Dikduk Arcade</a>
 

    </div>

    <p id="disabledMessage" class="disabled-note hidden">All games are currently disabled.</p>

    <button id="adminAccessButton" class="admin-button">Admin</button>

    <div id="adminPanel" class="admin-panel hidden">
      <h2>Game Controls</h2>
      <p id="adminStatus" class="disabled-note" style="margin-top:0; margin-bottom:12px;"></p>
      <div class="admin-row">
        <label for="siteEnabledToggle">Site enabled</label>
        <input id="siteEnabledToggle" type="checkbox">
      </div>
      <div id="gameToggles"></div>
    </div>

    <script>
      const adminPassword = "SimchaSecret123";
      const settingsApi = window.B3SiteSettings;
      const adminAccessButton = document.getElementById("adminAccessButton");
      const adminPanel = document.getElementById("adminPanel");
      const siteEnabledToggle = document.getElementById("siteEnabledToggle");
      const gameToggles = document.getElementById("gameToggles");
      const disabledMessage = document.getElementById("disabledMessage");
      const adminStatus = document.getElementById("adminStatus");
      const gameCards = Array.from(document.querySelectorAll(".game-card"));

      const gameDefinitions = gameCards.map((card) => ({
          id: card.dataset.gameId,
          name: card.textContent.trim(),
          element: card
      }));

      let currentSettings = settingsApi.defaultSettings;

      function renderGames() {
          let visibleCount = 0;

          gameDefinitions.forEach((game) => {
              const shouldShow = currentSettings.siteEnabled && currentSettings.games[game.id] !== false;
              game.element.classList.toggle("hidden", !shouldShow);
              if (shouldShow) {
                  visibleCount += 1;
              }
          });

          disabledMessage.classList.toggle("hidden", visibleCount !== 0);
      }

      function renderAdminPanel() {
          adminStatus.textContent = settingsApi.getMode() === "firebase"
              ? "Live mode: changes affect everyone."
              : "Preview mode: add your Firebase values in firebase-config.js to make changes live for everyone.";
          siteEnabledToggle.checked = currentSettings.siteEnabled;
          gameToggles.innerHTML = "";

          gameDefinitions.forEach((game) => {
              const row = document.createElement("div");
              row.className = "admin-row";

              const label = document.createElement("label");
              label.setAttribute("for", `toggle-${game.id}`);
              label.textContent = game.name;

              const input = document.createElement("input");
              input.type = "checkbox";
              input.id = `toggle-${game.id}`;
              input.checked = currentSettings.games[game.id] !== false;
              input.addEventListener("change", async () => {
                  try {
                      currentSettings.games[game.id] = input.checked;
                      renderGames();
                      await settingsApi.updateGameEnabled(game.id, input.checked);
                  } catch (error) {
                      alert("Could not save game setting.");
                  }
              });

              row.appendChild(label);
              row.appendChild(input);
              gameToggles.appendChild(row);
          });
      }

      function unlockAdminMode() {
          localStorage.setItem("isAdmin", "true");
          adminPanel.classList.remove("hidden");
          renderAdminPanel();
      }

      if (localStorage.getItem("isAdmin") === "true") {
          adminPanel.classList.remove("hidden");
      }

      adminAccessButton.addEventListener("click", () => {
          const isAdmin = localStorage.getItem("isAdmin") === "true";
          if (isAdmin) {
              adminPanel.classList.toggle("hidden");
              if (!adminPanel.classList.contains("hidden")) {
                  renderAdminPanel();
              }
              return;
          }

          const pass = prompt("Enter admin password:");
          if (pass === adminPassword) {
              unlockAdminMode();
              alert("Admin mode enabled");
          } else if (pass !== null) {
              alert("Wrong password");
          }
      });

      siteEnabledToggle.addEventListener("change", async () => {
          try {
              currentSettings.siteEnabled = siteEnabledToggle.checked;
              renderGames();
              await settingsApi.updateSiteEnabled(siteEnabledToggle.checked);
          } catch (error) {
              alert("Could not save site setting.");
          }
      });

      settingsApi.subscribe((settings) => {
          currentSettings = settings;
          renderGames();
          renderAdminPanel();
      });
    </script>

</body>
</html>
