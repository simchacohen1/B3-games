<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>B3 Games</title>
<style>
    body {
        font-family: Arial, sans-serif;
        background: #f5f7fa;
        text-align: center;
        padding: 40px;
    }

    h1 {
        font-size: 48px;
        margin-bottom: 30px;
        color: #333;
    }

    .game-container {
        display: flex;
        flex-direction: column;
        gap: 20px;
        max-width: 400px;
        margin: auto;
    }

    .game-card {
        background: white;
        padding: 20px;
        border-radius: 12px;
        box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        font-size: 24px;
        font-weight: bold;
        color: #333;
        text-decoration: none;
        transition: transform 0.15s, box-shadow 0.15s;
    }

    .game-card:hover {
        transform: translateY(-4px);
        box-shadow: 0 6px 14px rgba(0,0,0,0.15);
    }
</style>
</head>

<body>
    <h1>B3 Games</h1>

    <div class="game-container">
        <a class="game-card" href="tzitzis_game.html">Tzitzis Game</a>
        <a class="game-card" href="tzitzis_quest_arcade_v2.html">Tzitzis Quest Arcade</a>
        <a class="game-card" href="kahoot_word_quiz_engine_paste_only_any_perek.html">Kahoot Word Quiz Engine</a>
    </div>

    <!-- Admin-only toggle button (hidden until admin mode is unlocked) -->
    <button id="adminToggle" style="position:fixed; top:10px; right:10px; display:none; z-index:9999;">
      Toggle Site
    </button>

    <script>
      /* -----------------------------
         1. ADMIN PASSWORD
      ------------------------------ */
      const adminPassword = "SimchaSecret123"; // change this

      const adminToggle = document.getElementById("adminToggle");

      /* -----------------------------
         2. CHECK IF ADMIN MODE IS ON
      ------------------------------ */
      const isAdmin = localStorage.getItem("isAdmin") === "true";
      if (isAdmin) {
          adminToggle.style.display = "block";
      }

      /* -----------------------------
         3. PRESS "A" TO ENTER ADMIN MODE
      ------------------------------ */
      window.addEventListener("keydown", (e) => {
          if (e.key === "A") {
              const pass = prompt("Enter admin password:");
              if (pass === adminPassword) {
                  localStorage.setItem("isAdmin", "true");
                  adminToggle.style.display = "block";
                  alert("Admin mode enabled");
              }
          }
      });

      /* -----------------------------
         4. TOGGLE ACTIVE/INACTIVE
      ------------------------------ */
      adminToggle.onclick = () => {
          let current = localStorage.getItem("siteActive") === "true";
          localStorage.setItem("siteActive", (!current).toString());
          location.reload();
      };

      /* -----------------------------
         5. APPLY ACTIVE/INACTIVE MODE
         (IMPORTANT: Do NOT wipe the page)
      ------------------------------ */
      const siteActive = localStorage.getItem("siteActive") === "true";

      if (!siteActive) {
          const msg = document.createElement("div");
          msg.innerHTML = `
            <div style="text-align:center; margin-top:80px; font-family:sans-serif;">
              <h1>B3 Games are currently disabled</h1>
              <p>Please check back later.</p>
            </div>
          `;
          document.body.prepend(msg);
      }
    </script>

</body>
</html>
