<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Tent Trail Trivia - Play</title>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>
<style>
  body { font-family: Calibri, Arial, sans-serif; background: #fdf6ec; margin: 0; padding: 20px; color: #3a2417; text-align: center; }
  h1 { color: #b85042; margin-bottom: 4px; }
  .subtitle { color: #7d5236; margin-bottom: 20px; font-style: italic; }
  .name-box { max-width: 400px; margin: 0 auto 30px auto; }
  .name-box input { font-size: 18px; padding: 10px; width: 70%; border-radius: 8px; border: 1px solid #d9a85c; }
  .name-box button { font-size: 16px; padding: 10px 16px; border-radius: 8px; border: none; background: #7d5236; color: white; cursor: pointer; margin-left: 6px; }
  .panel { max-width: 500px; margin: 0 auto 24px auto; background: white; border-radius: 12px; border: 1px solid #d9a85c; padding: 24px; }
  .qhebrew { font-size: 32px; font-weight: bold; margin-bottom: 10px; }
  .qtext { font-size: 20px; margin-bottom: 20px; }
  .buzz-btn { font-size: 24px; padding: 24px 40px; border-radius: 50%; border: none; background: #b85042; color: white; cursor: pointer; width: 160px; height: 160px; }
  .buzz-btn:disabled { background: #ccc; cursor: not-allowed; }
  .status { margin-top: 16px; font-size: 16px; color: #7d5236; }
  .score-display { margin-top: 20px; font-size: 18px; }
  .hidden { display: none; }
</style>
</head>
<body>

<h1>Tent Trail Trivia</h1>
<div class="subtitle">Vayeira perek 18, posuk 1</div>

<div class="name-box" id="nameBox">
  <input type="text" id="nameInput" placeholder="Type your name" />
  <button onclick="joinGame()">Join</button>
</div>

<div id="gameArea" class="hidden">
  <div class="panel">
    <div class="qhebrew" id="qhebrew"></div>
    <div class="qtext" id="qtext"></div>
    <button class="buzz-btn" id="buzzBtn" onclick="buzzIn()">BUZZ IN</button>
    <div class="status" id="status"></div>
  </div>
  <div class="score-display">Your score: <span id="myScore">0</span></div>
</div>

<script>
// ---- REPLACE WITH YOUR FIREBASE CONFIG (same as teacher.html) ----
const firebaseConfig = {
  apiKey: "AIzaSyDaheO5K2qL8qe3rHIZY4nTd0wuEUG_DEs",
  authDomain: "b3-games.firebaseapp.com",
  databaseURL: "https://b3-games-default-rtdb.firebaseio.com",
  projectId: "b3-games",
  storageBucket: "b3-games.firebasestorage.app",
  messagingSenderId: "568530046190",
  appId: "1:568530046190:web:fd765fdd27e55a3c73f7ff"
};
// --------------------------------------------------------------------

firebase.initializeApp(firebaseConfig);
const db = firebase.database();
const gameRef = db.ref("tentTrailTrivia");

const questions = [
  { heb: "וַיֵּרָא", en: "This word means..." },
  { heb: "אֵלָיו", en: "This word means..." },
  { heb: "יֹשֵׁב", en: "This word means..." },
  { heb: "פֶּתַח", en: "This word means..." },
  { heb: "הָאֹהֶל", en: "This word means..." },
  { heb: "כְּחֹם הַיּוֹם", en: "This phrase means..." },
  { heb: "", en: "Who appeared to Avrohom in this posuk?" },
  { heb: "", en: "What mitzvah was Hashem doing by visiting Avrohom?" },
  { heb: "", en: "Why did Hashem make the day so hot, according to Rashi?" },
  { heb: "", en: "What mitzvah was Avrohom upset to miss out on that day?" }
];

let myName = "";

function sanitize(name) {
  return name.replace(/[.#$\[\]]/g, '_');
}

function joinGame() {
  const val = document.getElementById('nameInput').value.trim();
  if (!val) return;
  myName = sanitize(val);
  gameRef.child('scores').child(myName).transaction(current => current || 0);
  document.getElementById('nameBox').classList.add('hidden');
  document.getElementById('gameArea').classList.remove('hidden');
}

let sharedPlayerCtx = null;

function playBuzzSound() {
  if (!sharedPlayerCtx) {
    sharedPlayerCtx = new (window.AudioContext || window.webkitAudioContext)();
  }
  if (sharedPlayerCtx.state === "suspended") { sharedPlayerCtx.resume(); }
  const ctx = sharedPlayerCtx;
  const osc = ctx.createOscillator();
  const gain = ctx.createGain();
  const lfo = ctx.createOscillator();
  const lfoGain = ctx.createGain();

  osc.type = "sawtooth";
  osc.frequency.setValueAtTime(150, ctx.currentTime);

  lfo.type = "square";
  lfo.frequency.setValueAtTime(35, ctx.currentTime);
  lfoGain.gain.setValueAtTime(25, ctx.currentTime);
  lfo.connect(lfoGain);
  lfoGain.connect(osc.frequency);

  gain.gain.setValueAtTime(0.35, ctx.currentTime);
  gain.gain.setValueAtTime(0.35, ctx.currentTime + 0.35);
  gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.45);

  osc.connect(gain);
  gain.connect(ctx.destination);

  lfo.start();
  osc.start();
  lfo.stop(ctx.currentTime + 0.45);
  osc.stop(ctx.currentTime + 0.45);
}

function buzzIn() {
  playBuzzSound();
  gameRef.child('buzzedBy').transaction(current => current || myName);
}

gameRef.on('value', snapshot => {
  const data = snapshot.val() || {};
  const qIndex = data.qIndex || 0;
  const q = questions[qIndex] || questions[0];
  document.getElementById('qhebrew').textContent = q.heb;
  document.getElementById('qtext').textContent = q.en;

  const buzzBtn = document.getElementById('buzzBtn');
  const status = document.getElementById('status');
  if (data.buzzedBy) {
    buzzBtn.disabled = true;
    status.textContent = data.buzzedBy === myName ? "You buzzed in first!" : data.buzzedBy + " buzzed in first.";
  } else {
    buzzBtn.disabled = false;
    status.textContent = "";
  }

  if (myName && data.scores && data.scores[myName] !== undefined) {
    document.getElementById('myScore').textContent = data.scores[myName];
  }
});
</script>

</body>
</html>
